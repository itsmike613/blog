<!doctype html>
<html lang="en">

<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="My Blog" property="og:title">
    <meta content="Ideas, opinions, and conversations that matter." property="og:description">
    <meta content="https://itsmike613.github.io/blog/" property="og:url">
    <meta content="https://github.com/itsmike613/blog/blob/main/Source/Images/logo.png?raw=true" property="og:image">
    <meta content="#2F5F4F" data-react-helmet="true" name="theme-color">

    <!-- Tab -->
    <link rel="icon" type="image/x-icon" href="Source/Images/logo.png">
    <title>My Blog - Read</title>

    <!-- Styles -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    <link rel="stylesheet" href="Source/Styles/index.css">
</head>

<body>
    <header class="site-header">
        <a class="back" href="index.html"><i class="ph ph-arrow-left"></i>All posts</a>
        <div class="actions">
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle theme"><i class="ph ph-moon"></i></button>
        <a class="btn" id="authButton" href="auth.html"><i class="ph ph-sign-in"></i><span>Login</span></a>
        </div>
    </header>

    <main class="wrap narrow">
        <article id="article" class="article"></article>

        <section class="panel" id="reactionPanel">
            <div class="section-head">
                <h2>Reactions</h2>
            </div>
            <div id="reactions" class="reactions"></div>
        </section>

        <section class="panel" id="commentsPanel">
            <div class="section-head">
                <h2>Comments</h2>
            </div>
            <form id="commentForm" class="comment-form">
                <textarea id="commentText" rows="4" maxlength="1200" placeholder="Add a comment"></textarea>
                <div class="form-row">
                    <p class="muted" id="commentHelp">Sign in to comment.</p>
                    <button class="btn primary" type="submit">Post</button>
                </div>
            </form>
            <div id="comments" class="comments"></div>
        </section>
    </main>

    <script type="module" src="Source/Scripts/index.js"></script>
</body>

</html>
